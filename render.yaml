services:
  - type: web
    name: mindstream-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NVIDIA_KEY_DEEPSEEK
        sync: false
      - key: NVIDIA_KEY_DEEPSEEK_PRO
        sync: false
      - key: NVIDIA_KEY_KIMI
        sync: false
      - key: NVIDIA_API_KEYS
        sync: false
      - key: CLIENT_URL
        sync: false
