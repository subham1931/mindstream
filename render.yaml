services:
  - type: web
    name: mindstream-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NVIDIA_API_KEYS
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        sync: false
      - key: NVIDIA_FALLBACK_MODELS
        sync: false
      - key: CLIENT_URL
        sync: false
